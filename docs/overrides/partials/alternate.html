<div class="md-header__option" data-md-component="language-switcher">
  <div class="md-select">
    {% set icon = config.theme.icon.alternate or "material/translate" %}
    <button class="md-header__button md-icon" aria-label="{{ lang.t('select.language') }}">
      {% include ".icons/" ~ icon ~ ".svg" %}
    </button>
    <div class="md-select__inner">
      <ul class="md-select__list">
        {% for alt in language_alternates %}
          <li class="md-select__item">
            {% if alt.available and not alt.selected %}
              <a href="{{ alt.link | url }}" hreflang="{{ alt.lang }}" class="md-select__link">
                {{ alt.name }}
              </a>
            {% elif alt.selected %}
              <span class="md-select__link md-select__link--active" aria-current="page">
                {{ alt.name }}
              </span>
            {% else %}
              <span class="md-select__link md-select__link--disabled" aria-disabled="true">
                {{ alt.name }}
              </span>
            {% endif %}
          </li>
        {% endfor %}
      </ul>
    </div>
  </div>
</div>
